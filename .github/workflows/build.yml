name: Java CI with Maven

# O robô vai rodar sempre que você fizer um 'push' para a 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Liga uma máquina virtual com a versão mais recente do Ubuntu
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Rodar Testes e Fazer o Build
      run: ./mvnw clean package